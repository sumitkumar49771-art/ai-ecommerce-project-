<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Forgot Password — ShopAI</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="form-card">
    <h2>Forgot Password</h2>
    <p style="font-size:14px; color:var(--muted); margin-top:-8px;">
      Enter your account email and we'll send you a link to reset your password.
    </p>
    <div id="alert-box"></div>
    <form onsubmit="handleForgotPassword(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required />
      </div>
      <button class="btn" style="width:100%" type="submit" id="forgot-submit-btn">Send Reset Link</button>
    </form>
    <p class="form-note"><a href="login.html">Back to Login</a></p>
  </div>

  <div id="footer"></div>

  <script src="js/api.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
