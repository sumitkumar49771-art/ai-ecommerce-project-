<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset Password — ShopAI</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="form-card">
    <h2>Reset Password</h2>
    <div id="alert-box"></div>
    <form onsubmit="handleResetPassword(event)">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="password" required minlength="8" />
        <small class="form-hint">At least 8 characters, with an uppercase letter, a lowercase letter, and a number.</small>
      </div>
      <div class="form-group">
        <label>Confirm New Password</label>
        <input type="password" id="confirmPassword" required minlength="8" />
      </div>
      <button class="btn" style="width:100%" type="submit">Reset Password</button>
    </form>
    <p class="form-note"><a href="login.html">Back to Login</a></p>
  </div>

  <div id="footer"></div>

  <script src="js/api.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
