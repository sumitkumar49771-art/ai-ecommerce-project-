<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login — ShopAI</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="form-card">
    <h2>Login</h2>
    <div id="alert-box"></div>
    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required />
      </div>
      <p style="text-align:right; margin:-8px 0 12px;"><a href="forgot-password.html" style="font-size:13px;">Forgot password?</a></p>
      <button class="btn" style="width:100%" type="submit">Login</button>
    </form>
    <p class="form-note">Don't have an account? <a href="register.html">Sign up</a></p>
    <p class="form-note">Demo user: user@example.com / User@1234</p>
    <p class="form-note">Demo admin: admin@example.com / Admin@123</p>
  </div>

  <div id="footer"></div>

  <script src="js/api.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
