<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Invoice — ShopAI</title>
<link rel="stylesheet" href="css/style.css" />
<style>
  @media print {
    .navbar, .navbar-categories, #footer, .no-print { display: none !important; }
    body { background: #fff; }
  }
  .invoice-box {
    max-width: 800px; margin: 30px auto; background: var(--card-bg);
    border: 1px solid var(--border); border-radius: var(--radius); padding: 40px;
  }
  .invoice-box table { width: 100%; border-collapse: collapse; margin-top: 20px; }
  .invoice-box th, .invoice-box td { text-align: left; padding: 10px; border-bottom: 1px solid var(--border); }
  .invoice-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; }
</style>
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="container no-print" style="margin-top:16px;">
    <button class="btn" onclick="window.print()">🖨️ Print / Save as PDF</button>
    <a href="orders.html" class="btn btn-outline" style="margin-left:8px;">← Back to My Orders</a>
  </div>

  <div class="invoice-box" id="invoice-box">
    <p>Loading invoice...</p>
  </div>

  <div id="footer"></div>

  <script src="js/api.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/main.js"></script>
  <script src="js/invoice.js"></script>
  <script>loadInvoice();</script>
</body>
</html>
