name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend — install, lint check & Jest tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Syntax-check every backend JS file
        working-directory: backend
        run: |
          find . -name "*.js" -not -path "./node_modules/*" -print0 | xargs -0 -n1 node --check

      - name: Run Jest tests
        working-directory: backend
        run: npm test

  frontend-syntax-check:
    name: Frontend — syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Syntax-check every frontend JS file
        run: |
          find frontend/js -name "*.js" -not -path "*/vendor/*" -print0 | xargs -0 -n1 node --check
